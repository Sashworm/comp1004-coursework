<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <header>
      <h1>People Search</h1>
      <nav aria-label="Main navigation">
        <ul class="nav-list">
          <li><a href="index.html">People search</a></li>
          <li><a href="vehicle.html">Vehicle search</a></li>
          <li><a href="add-vehicle.html">Add a vehicle</a></li>
        </ul>
      </nav>
      <button id="reset" type="button">Reset</button>
    </header>

    <aside>
      <img src="images/database.svg" alt="Database icon">
    </aside>

    <main>
      <form id="people-form">
        <p>
          <label for="name">Search by driver name</label>
          <input id="name" type="text" autocomplete="name">
        </p>
        <p>
          <label for="license">Search by driving license number</label>
          <input id="license" type="text">
        </p>
        <button type="submit">Submit</button>
      </form>
      <p id="message" aria-live="polite"></p>
      <section id="results" aria-label="Search results"></section>
    </main>

    <footer>
      <p>This is a sample for the COMP1004 coursework.</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
